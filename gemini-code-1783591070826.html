    <style>
        /* --- STYLE CSS --- */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #121212; 
            color: #ffffff;
        }
        header {
            text-align: center;
            padding: 80px 20px 40px;
            border-bottom: 1px solid #333;
        }
        h1 {
            font-size: 3em;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p.subtitle {
            color: #aaaaaa;
            font-size: 1.2em;
            margin: 0;
            font-weight: 300;
        }
        h2.section-title {
            text-align: center;
            font-size: 2em;
            margin: 60px 0 20px;
            letter-spacing: 1px;
            color: #ffffff;
            font-weight: 400;
        }

        /* --- GRILLE VIDÉOS --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-item {
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
        }
        .video-item:hover {
            transform: translateY(-5px); 
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            padding: 15px;
            font-size: 1.1em;
            text-align: center;
            color: #dddddd;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* --- GRILLE PHOTOS --- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto 60px auto;
        }
        .photo-item {
            width: 100%;
            height: 250px; 
            object-fit: cover; 
            border-radius: 4px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: pointer;
        }
        .photo-item:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #080808;
            color: #666666;
            font-size: 0.9em;
            border-top: 1px solid #333;
        }
    </style>
</head>
