    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        header { 
            position: absolute; 
            top: 0; left: 0; width: 100%;
            text-align: center; 
            padding: 40px 0; 
            z-index: 999; 
            /* Dégradé subtil pour garder les titres lisibles par-dessus les images */
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
            pointer-events: none; /* Laisse passer les clics à travers le header transparent */
        }
        .glitch, nav a { pointer-events: auto; } /* Réactive les clics uniquement sur les boutons */
        
        .glitch { font-family: 'Syne', sans-serif; font-size: 5em; font-weight: 800; text-transform: uppercase; cursor: pointer; margin: 0 0 10px 0; color: #fff; }
        .glitch:hover { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { color: #fff; text-shadow: 2px 0 red; } 50% { color: #fff; text-shadow: -2px 0 cyan; } 100% { color: #fff; text-shadow: 2px 0 red; } }
        
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 1.2rem; font-weight: 800; transition: 0.3s; font-family: 'Syne', sans-serif; }
        nav a:hover { color: #ff0000; }

        /* Mosaïque Murale Totale - Commence tout en haut de la page */
        .mosaic-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            grid-auto-rows: 240px;
            grid-auto-flow: dense; 
            gap: 0; 
            width: 100%;
            padding-top: 0; /* Les photos montent tout en haut derrière le titre */
        }
        
        .item { 
            position: relative; 
            background-color: #000;
            overflow: visible; 
        }

        /* Tailles asymétriques */
        .item.large-w { grid-column: span 2; }
        .item.large-h { grid-row: span 2; }
        .item.large-both { grid-column: span 2; grid-row: span 2; }
        
        .item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.3s step-start, box-shadow 0.3s ease;
            position: relative;
            z-index: 1;
            cursor: pointer;
            display: block;
        }

        /* Sécurité anti-barres noires : force un léger zoom sur les images "Stills" qui ont du noir natif */
        .item img[src*="STILLS"], .item img[src*="00000"] {
            transform: scale(1.05);
        }
        
        /* Effet au survol combiné avec la sécurité */
        .item:hover img { 
            transform: scale(1.15) !important; 
            z-index: 10; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        /* Lightbox */
        #lightbox { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 3em; cursor: pointer; background: none; border: none; padding: 20px; z-index: 1001; transform: translateY(-50%); transition: 0.2s; }
        .nav-btn:hover { color: #ff0000; }

        @media (max-width: 768px) {
            .mosaic-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); grid-auto-rows: 140px; }
            .item.large-w, .item.large-h, .item.large-both { grid-column: span 1; grid-row: span 1; }
            .glitch { font-size: 3em; }
        }
    </style>
</head>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <button class="nav-btn" style="left:20px;" onclick="changeImg(-1, event)">&#10094;</button>
        <img id="lb-img" src="">
        <button class="nav-btn" style="right:20px;" onclick="changeImg(1, event)">&#10095;</button>
    </div>

    <script>
        const imgs = Array.from(document.querySelectorAll('.item img'));
        let current = 0;
        function openLB(src) {
            current = imgs.findIndex(img => img.src.includes(src));
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function changeImg(n, e) {
            e.stopPropagation();
            current = (current + n + imgs.length) % imgs.length;
            document.getElementById('lb-img').src = imgs[current].src;
        }
    </script>
