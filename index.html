    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    header { text-align: center; padding: 40px 20px; }
    
    .mosaic-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
        grid-auto-rows: 300px; /* Force une hauteur uniforme */
        grid-auto-flow: dense; /* Remplit les trous intelligemment */
        gap: 10px; 
        padding: 10px; 
        max-width: 1400px; 
        margin: 0 auto; 
    }
    
    .item { overflow: hidden; cursor: pointer; }
    .item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .item:hover img { transform: scale(1.05); }
    
    .video-item { grid-column: span 2; grid-row: span 2; background: #000; }
    .video-item iframe { width: 100%; height: 100%; border: none; }
    
    /* Le reste (glitch, lightbox) reste identique */
</style>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <button class="nav-btn" style="left:20px;" onclick="changeImg(-1, event)">&#10094;</button>
        <img id="lb-img" src="">
        <button class="nav-btn" style="right:20px;" onclick="changeImg(1, event)">&#10095;</button>
    </div>

    <script>
        const imgs = Array.from(document.querySelectorAll('.item img'));
        let current = 0;
        function openLB(src) {
            current = imgs.findIndex(img => img.src.includes(src));
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function changeImg(n, e) {
            e.stopPropagation();
            current = (current + n + imgs.length) % imgs.length;
            document.getElementById('lb-img').src = imgs[current].src;
        }
    </script>
