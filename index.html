    <style>
        body { margin: 0; background: #000; font-family: sans-serif; }
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            grid-auto-rows: 450px;
            gap: 15px;
            padding: 15px;
        }
        .item { position: relative; overflow: hidden; cursor: pointer; }
        .item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .item:hover img { transform: scale(1.05); }
        .video-item { grid-column: span 2; grid-row: span 2; background: #000; }
        .video-item iframe { width: 100%; height: 100%; border: none; }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
</head>
