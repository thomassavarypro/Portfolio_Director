    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        header { text-align: center; padding: 40px 20px; }
        .glitch { font-family: 'Syne', sans-serif; font-size: 5em; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }
        .glitch:hover { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { color: #fff; text-shadow: 2px 0 red; } 50% { color: #fff; text-shadow: -2px 0 cyan; } 100% { color: #fff; text-shadow: 2px 0 red; } }
        
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 1.2rem; transition: 0.3s; font-family: 'Syne', sans-serif;}
        nav a:hover { color: #ff0000; }

        /* Belle Mosaïque Multi-colonnes (Photos ajustées et plus compactes) */
        .mosaic-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; 
            padding: 20px; 
            max-width: 1600px; 
            margin: 0 auto; 
        }
        
        .item { 
            position: relative; 
            aspect-ratio: 16 / 9; 
            background-color: #000;
            overflow: visible; /* Indispensable pour permettre le débordement au survol */
        }
        
        /* Alignement parfait au format 4/3 centré */
        .item img { 
            position: absolute; 
            top: 0; 
            left: 50%;
            transform: translateX(-50%);
            height: 100%; 
            aspect-ratio: 4 / 3; 
            object-fit: cover; 
            transition: transform 0.3s ease, z-index 0.3s ease, box-shadow 0.3s ease;
            z-index: 1;
            cursor: pointer;
        }
        
        /* Effet de survol : l'image s'agrandit et passe au-dessus des autres cases */
        .item:hover img { 
            transform: translateX(-50%) scale(1.15); 
            z-index: 10; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }

        /* Lightbox plein écran */
        #lightbox { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 3em; cursor: pointer; background: none; border: none; padding: 20px; z-index: 1001; transform: translateY(-50%); transition: 0.2s; }
        .nav-btn:hover { color: #ff0000; }
    </style>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <button class="nav-btn" style="left:20px;" onclick="changeImg(-1, event)">&#10094;</button>
        <img id="lb-img" src="">
        <button class="nav-btn" style="right:20px;" onclick="changeImg(1, event)">&#10095;</button>
    </div>

    <script>
        const imgs = Array.from(document.querySelectorAll('.item img'));
        let current = 0;
        function openLB(src) {
            current = imgs.findIndex(img => img.src.includes(src));
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function changeImg(n, e) {
            e.stopPropagation();
            current = (current + n + imgs.length) % imgs.length;
            document.getElementById('lb-img').src = imgs[current].src;
        }
    </script>
