<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Réalisateur</title>
    
    <script src="https://player.vimeo.com/api/player.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #000000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 140px 20px 80px;
        }
        
        header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 5.5em; 
            letter-spacing: -3px; 
            text-transform: uppercase;
            margin: 0;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 40%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GRILLE DE LA MOSAÏQUE (Agrandie) --- */
        .mosaic-grid {
            display: grid;
            /* La taille de base passe à 350px au lieu de 280px pour des photos plus grandes */
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: 350px;
            grid-auto-flow: dense;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto 100px auto;
        }

        .mosaic-item {
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer; /* Indique qu'on peut cliquer */
        }
        
        .mosaic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .mosaic-item:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }

        .mosaic-item:hover img {
            opacity: 0.8;
        }

        /* Formats de la grille */
        .shape-1-1 { grid-column: span 1; grid-row: span 1; } 
        .shape-4-5 { grid-column: span 1; grid-row: span 2; } 
        .shape-16-9 { grid-column: span 2; grid-row: span 1; } 
        .shape-9-16 { grid-column: span 1; grid-row: span 2; } 

        /* --- VIDÉOS INCRUSTÉES --- */
        .shape-video {
            grid-column: span 2; /* Prend la largeur de 2 photos */
            grid-row: span 2;    /* Prend la hauteur de 2 photos */
            background: #000;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
            cursor: default;
        }
        
        .shape-video:hover {
            transform: none; /* Pas d'effet de zoom sur les vidéos */
        }

        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            transform: translateY(-50%); /* Centre la vidéo 16/9 dans le bloc carré/rectangle */
            padding-bottom: 56.25%; 
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- VISIONNEUSE (LIGHTBOX) --- */
        #lightbox {
            display: none; /* Caché par défaut */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px); /* Floute l'arrière-plan */
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain; /* Garde le format original sans couper */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ffffff;
            font-size: 4em;
            cursor: pointer;
            padding: 20px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .lightbox-btn:hover {
            opacity: 1;
        }

        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 3em;
            cursor: pointer;
            opacity: 0.5;
        }
        #close-btn:hover { opacity: 1; }

        @media (max-width: 768px) {
            header h1 { font-size: 3em; }
            .mosaic-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); grid-auto-rows: 250px; }
            .shape-16-9, .shape-video { grid-column: span 1; grid-row: span 1; }
            .shape-4-5, .shape-9-16 { grid-row: span 1; }
            .lightbox-btn { font-size: 2em; padding: 10px; }
        }
    </style>
</head>
<body>

    </main>

    <div id="lightbox">
        <button id="close-btn">&times;</button>
        <button id="prev-btn" class="lightbox-btn">&#10094;</button>
        <img id="lightbox-img" src="" alt="Zoomed Still">
        <button id="next-btn" class="lightbox-btn">&#10095;</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            /* --- GESTION DES VIDÉOS (Play/Pause au défilement) --- */
            const videoBlocks = document.querySelectorAll('.video-block');
            const observerOptions = { root: null, rootMargin: '-20% 0px -20% 0px', threshold: 0.5 };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const iframe = entry.target.querySelector('iframe');
                    if (!iframe) return;
                    const player = new Vimeo.Player(iframe);
                    if (entry.isIntersecting) {
                        player.play().catch(() => {});
                    } else {
                        player.pause().catch(() => {});
                    }
                });
            }, observerOptions);

            videoBlocks.forEach(block => observer.observe(block));

            /* --- GESTION DE LA VISIONNEUSE (Lightbox) --- */
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('close-btn');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            // On récupère toutes les images cliquables (pas les vidéos)
            const images = Array.from(document.querySelectorAll('.mosaic-item:not(.shape-video) img'));
            let currentIndex = 0;

            // Fonction pour ouvrir la photo
            function openLightbox(index) {
                currentIndex = index;
                lightboxImg.src = images[currentIndex].src;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; // Empêche le site de scroller derrière
            }

            // Fermer
            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }

            // Photo précédente/suivante avec boucle infinie
            function showPrev() {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                lightboxImg.src = images[currentIndex].src;
            }
            function showNext() {
                currentIndex = (currentIndex + 1) % images.length;
                lightboxImg.src = images[currentIndex].src;
            }

            // Ajout des clics sur chaque photo
            images.forEach((img, index) => {
                img.addEventListener('click', () => openLightbox(index));
            });

            // Clics sur les boutons de la visionneuse
            closeBtn.addEventListener('click', closeLightbox);
            prevBtn.addEventListener('click', showPrev);
            nextBtn.addEventListener('click', showNext);

            // Fermer si on clique dans le noir autour de la photo
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // GESTION DU CLAVIER (Flèches et Echap)
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'ArrowLeft') showPrev();
                if (e.key === 'ArrowRight') showNext();
                if (e.key === 'Escape') closeLightbox();
            });

            // GESTION DU TRACKPAD (Balayage avec 2 doigts)
            let lastSwipeTime = 0;
            window.addEventListener('wheel', (e) => {
                if (!lightbox.classList.contains('active')) return;
                
                // Le cooldown empêche de passer 15 photos d'un coup
                const now = new Date().getTime();
                if (now - lastSwipeTime < 400) return; 

                // Si on balaye horizontalement assez fort
                if (e.deltaX > 25) { 
                    showNext(); 
                    lastSwipeTime = now; 
                } else if (e.deltaX < -25) { 
                    showPrev(); 
                    lastSwipeTime = now; 
                }
            });

        });
    </script>

</body>
</html>
