    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        header { 
            position: absolute; 
            top: 0; left: 0; width: 100%;
            text-align: center; 
            padding: 40px 0; 
            z-index: 999; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; 
        }
        .glitch, nav a { pointer-events: auto; } 
        
        .glitch { font-family: 'Syne', sans-serif; font-size: 5em; font-weight: 800; text-transform: uppercase; cursor: pointer; margin: 0 0 10px 0; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .glitch:hover { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { color: #fff; text-shadow: 2px 0 red; } 50% { color: #fff; text-shadow: -2px 0 cyan; } 100% { color: #fff; text-shadow: 2px 0 red; } }
        
        nav a { color: white; text-decoration: none; margin: 0 15px; font-size: 1.2rem; font-weight: 800; transition: 0.3s; font-family: 'Syne', sans-serif; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        nav a:hover { color: #ff0000; }

        /* GRILLE 50 PHOTOS : 5 colonnes sur PC, 2 sur Mobile. 0 trou garanti. */
        .mosaic-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 0; 
            width: 100%;
            padding: 0; 
            margin: 0;
        }
        
        .item { 
            aspect-ratio: 4 / 3; 
            position: relative; 
            overflow: hidden; 
            background-color: #000;
        }
        
        .item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scale(1.06); 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            display: block;
        }
        
        .item:hover img { transform: scale(1.15); }

        #lightbox { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 3em; cursor: pointer; background: none; border: none; padding: 20px; z-index: 1001; transform: translateY(-50%); transition: 0.2s; }
        .nav-btn:hover { color: #ff0000; }

        @media (max-width: 768px) {
            .mosaic-grid { grid-template-columns: repeat(2, 1fr); }
            .glitch { font-size: 3em; }
        }
    </style>
</head>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <button class="nav-btn" style="left:20px;" onclick="changeImg(-1, event)">&#10094;</button>
        <img id="lb-img" src="">
        <button class="nav-btn" style="right:20px;" onclick="changeImg(1, event)">&#10095;</button>
    </div>

    <script>
        const imgs = Array.from(document.querySelectorAll('.item img'));
        let current = 0;
        function openLB(src) {
            current = imgs.findIndex(img => img.src.includes(src));
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function changeImg(n, e) {
            e.stopPropagation();
            current = (current + n + imgs.length) % imgs.length;
            document.getElementById('lb-img').src = imgs[current].src;
        }
    </script>
